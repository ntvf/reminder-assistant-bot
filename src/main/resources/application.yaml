spring:
  application:
    name: reminder
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:reminder}
    username: ${DB_USER:reminder}
    password: ${DB_PASSWORD:reminder}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  quartz:
    job-store-type: memory
    properties:
      org.quartz.threadPool.threadCount: 5
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  max-reminders-per-chat: 10
  daily-reminder-limit: 50

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN}
  bot-username: ${TELEGRAM_BOT_USERNAME}

spring.ai.openai:
  api-key: ${OPENAI_API_KEY}
  chat:
    options:
      model: gpt-5.4-mini
      temperature: 0.1
