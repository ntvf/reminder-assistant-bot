services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: reminder
      POSTGRES_USER: reminder
      POSTGRES_PASSWORD: reminder
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reminder"]
      interval: 5s
      timeout: 5s
      retries: 5
