name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Test, Checkstyle, Coverage
        run: ./mvnw verify

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Coverage summary
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "**Line coverage: $(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('target/site/jacoco/jacoco.xml')
          for c in tree.getroot().findall('counter'):
              if c.get('type') == 'LINE':
                  missed, covered = int(c.get('missed')), int(c.get('covered'))
                  print(f'{round(covered / (missed + covered) * 100, 1)}%')
                  break
          ")** (quality gate: 50%)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Class | Lines covered |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('target/site/jacoco/jacoco.xml')
          for pkg in tree.getroot().findall('package'):
              for cls in pkg.findall('class'):
                  name = cls.get('name').split('/')[-1]
                  for c in cls.findall('counter'):
                      if c.get('type') == 'LINE':
                          missed, covered = int(c.get('missed')), int(c.get('covered'))
                          total = missed + covered
                          if total > 0:
                              pct = round(covered / total * 100)
                              print(f'| {name} | {covered}/{total} ({pct}%) |')
          " >> $GITHUB_STEP_SUMMARY

      - name: Build release JAR
        run: |
          ./mvnw package -DskipTests
          cp target/reminder-0.0.1-SNAPSHOT.jar target/reminder.jar

      - name: Generate tag and release notes
        id: meta
        run: |
          TAG="v1.0.${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          NOTES=$(git log --pretty=format:"- %s" $RANGE | head -50)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Release ${{ steps.meta.outputs.tag }}
          body: |
            ## Changes
            ${{ steps.meta.outputs.notes }}
          files: target/reminder.jar

  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check-data
          key: nvd-${{ hashFiles('**/pom.xml') }}
          restore-keys: nvd-

      - name: OWASP Dependency Check
        run: |
          EXTRA=""
          if [ -n "${{ secrets.NVD_API_KEY }}" ]; then
            EXTRA="-DnvdApiKey=${{ secrets.NVD_API_KEY }}"
          fi
          ./mvnw dependency-check:check -DfailBuildOnCVSS=7 $EXTRA

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
