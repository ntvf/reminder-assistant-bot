name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Test with coverage
        run: ./mvnw verify

      - name: Extract coverage
        id: coverage
        run: |
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('target/site/jacoco/jacoco.xml')
          root = tree.getroot()
          for c in root.findall('counter'):
              if c.get('type') == 'LINE':
                  missed, covered = int(c.get('missed')), int(c.get('covered'))
                  print(f'{round(covered / (missed + covered) * 100, 1)}')
                  break
          ")
          echo "pct=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Coverage summary
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "**Line coverage: ${{ steps.coverage.outputs.pct }}%** (quality gate: 50%)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Class | Lines covered |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('target/site/jacoco/jacoco.xml')
          for pkg in tree.getroot().findall('package'):
              for cls in pkg.findall('class'):
                  name = cls.get('name').split('/')[-1]
                  for c in cls.findall('counter'):
                      if c.get('type') == 'LINE':
                          missed, covered = int(c.get('missed')), int(c.get('covered'))
                          total = missed + covered
                          if total > 0:
                              pct = round(covered / total * 100)
                              print(f'| {name} | {covered}/{total} ({pct}%) |')
          " >> $GITHUB_STEP_SUMMARY

      - name: Build release JAR
        run: |
          ./mvnw package -DskipTests
          cp target/reminder-0.0.1-SNAPSHOT.jar target/reminder.jar

      - name: Generate tag and release notes
        id: meta
        run: |
          TAG="v1.0.${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          NOTES=$(git log --pretty=format:"- %s" $RANGE | head -50)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Release ${{ steps.meta.outputs.tag }}
          body: |
            ## Changes
            ${{ steps.meta.outputs.notes }}

            ## Quality
            Line coverage: **${{ steps.coverage.outputs.pct }}%** (gate: 50%)
          files: target/reminder.jar
